<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Resource Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" />

<style>

:root{
--yellow:#e6c200;
--navy:#1a3a5f;
--light:#f7f9fb;
--border:#d4b800;
--text:#1a3a5f;
--sub:#3a5a7f;
}

*,*::before,*::after{box-sizing:border-box;}

html,body{
height:100%;
margin:0;
font-family:'Montserrat',sans-serif;
background:var(--navy);
}

.app{
display:grid;
grid-template-columns:320px 1fr;
height:100vh;
width:100%;
}

.sidebar{
border-right:2px solid var(--border);
background:#fff;
overflow:hidden;
display:flex;
flex-direction:column;
z-index:1000;
transition:transform .3s ease;
}

.controls{
padding:14px 12px 10px;
border-bottom:1px solid var(--border);
background:#fff;
}

.controls h2{
margin:0 0 10px;
font-size:16px;
color:var(--navy);
font-weight:700;
line-height:1.3;
}

.controls input,
.controls select{
width:100%;
margin-bottom:8px;
padding:12px;
font-size:15px;
font-family:'Montserrat',sans-serif;
border:1.5px solid var(--navy);
border-radius:8px;
background:var(--light);
color:var(--navy);
outline:none;
appearance:none;
min-height:44px;
}

.controls input::placeholder{color:var(--sub);opacity:.7;}

.controls input:focus,
.controls select:focus{
border-color:var(--navy);
box-shadow:0 0 0 2px rgba(26,58,95,.15);
}

.results{
overflow:auto;
padding:8px;
flex:1;
background:#fff;
-webkit-overflow-scrolling:touch;
}

.result-item{
padding:12px;
border:1.5px solid var(--navy);
border-radius:10px;
margin-bottom:8px;
cursor:pointer;
background:#fff;
transition:background .15s;
min-height:44px;
}

.result-item:hover{background:var(--light);}

.result-title{
font-weight:700;
margin-bottom:4px;
font-size:14px;
color:var(--navy);
}

.result-meta{
font-size:12px;
color:var(--sub);
line-height:1.4;
}

#map{
height:100%;
width:100%;
background:var(--navy);
}

.leaflet-tile-pane{
filter:sepia(1) saturate(2.1) hue-rotate(175deg) brightness(.35) contrast(1.28);
}

.leaflet-container{
background:var(--navy)!important;
}

/* MARKER */

.custom-marker{
width:14px;
height:14px;
border-radius:50%;
background:var(--yellow);
border:2px solid #ffffff;
box-shadow:0 0 4px rgba(255,255,255,.6),0 1px 3px rgba(0,0,0,.35);
}

/* CLUSTER STYLE FIX */

.marker-cluster-small,
.marker-cluster-medium,
.marker-cluster-large{
background:rgba(230,194,0,.45)!important;
border:3px solid #ffffff!important;
box-shadow:0 0 8px rgba(255,255,255,.35);
}

.marker-cluster-small div,
.marker-cluster-medium div,
.marker-cluster-large div{
background:var(--yellow)!important;
color:var(--navy)!important;
border:2px solid #ffffff!important;
font-weight:700;
font-family:'Montserrat',sans-serif;
}

.legend{
padding:10px 12px;
font-size:12px;
border-top:1px solid var(--border);
background:#fff;
}

.legend-row{
display:flex;
align-items:center;
margin-bottom:5px;
gap:8px;
color:var(--navy);
}

.legend-swatch{
width:12px;
height:12px;
border-radius:50%;
flex:0 0 12px;
background:var(--yellow);
border:1.5px solid #ffffff;
box-shadow:0 0 3px rgba(255,255,255,.6);
}

.leaflet-popup-content-wrapper{
border-radius:10px;
border:1.5px solid var(--navy);
box-shadow:0 2px 8px rgba(26,58,95,.2);
font-family:'Montserrat',sans-serif;
}

.leaflet-popup-content{
color:var(--navy);
font-size:13px;
}

.leaflet-popup-content a{
color:var(--navy);
font-weight:bold;
}

.leaflet-popup-tip{
background:#fff;
}

</style>

</head>

<body>

<div class="app">

<div class="sidebar" id="sidebar">

<div class="controls">
<h2>Small Business Supporters Across America</h2>

<input id="searchInput" type="text" placeholder="Search by name, city, state..." />

<select id="categoryFilter">
<option value="all">All categories</option>
</select>

</div>

<div id="results" class="results"></div>
<div class="legend" id="legend"></div>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>

const SHEET_CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTjsEUDOSnLBUXNjryuSAN6oi95RlVK0YWstoEgCYOwSl0YO6rRfOW7xLke6tZ96iUf7jmElhv5Km4e/pub?output=csv";

const map=L.map("map").setView([39.8283,-98.5795],4);

L.tileLayer(
"https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png",
{
maxZoom:19,
attribution:'© OpenStreetMap contributors'
}
).addTo(map);

let allData=[];
let markerClusterGroup=L.markerClusterGroup();
let markersById=new Map();

function makeMarkerIcon(){
return L.divIcon({
className:"",
html:`<div class="custom-marker"></div>`,
iconSize:[14,14],
iconAnchor:[7,7],
popupAnchor:[0,-8]
});
}

function normalizeRow(row,i){
return{
id:i,
name:row.name||"",
city:row.city||"",
state:row.state||"",
category:row.category||"",
lat:parseFloat(row.lat),
lng:parseFloat(row.lng)
};
}

function renderMarkers(data){

markerClusterGroup.clearLayers();
markersById.clear();

data.forEach(row=>{

const marker=L.marker(
[row.lat,row.lng],
{icon:makeMarkerIcon()}
);

markersById.set(row.id,marker);
markerClusterGroup.addLayer(marker);

});

if(!map.hasLayer(markerClusterGroup))
map.addLayer(markerClusterGroup);

}

Papa.parse(
SHEET_CSV_URL,
{
download:true,
header:true,
skipEmptyLines:true,

complete(res){

allData=res.data
.map(normalizeRow)
.filter(r=>!isNaN(r.lat)&&!isNaN(r.lng));

renderMarkers(allData);

}

}
);

</script>

</body>
</html>
